# CORS Configuration
chat.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
chat.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
chat.cors.allowed-headers=*
chat.cors.allow-credentials=true

# Server Configuration
server.port=${PORT:8080}

# Ollama Configuration
ollama.api.url=${OLLAMA_API_URL:http://localhost:11434}
ollama.model=${OLLAMA_MODEL:llama3.2}
ollama.api.temperature=${OLLAMA_API_TEMPERATURE:0.7}

logging.level.com.example.chatapp=INFO
logging.level.org.springframework.web=INFO
spring.jackson.serialization.FAIL_ON_EMPTY_BEANS=false

# Ollama API configuration
ollama.api.tags-path=/api/tags
ollama.api.chat-path=/api/chat
ollama.model.description=Ollama model

# Tool configuration
tools.websearch.enabled=true
tools.websearch.max-results=5
# Google Custom Search API (optional — enables full web search)
# Get a free API key: https://developers.google.com/custom-search/v1/introduction
# Get a Search Engine ID: https://programmablesearchengine.google.com/
# Free tier: 100 queries/day. Without these, falls back to DuckDuckGo Instant Answer API.
tools.websearch.google.api-key=${GOOGLE_API_KEY:}
tools.websearch.google.search-engine-id=${GOOGLE_SEARCH_ENGINE_ID:}