name: Release

# Triggers when a version tag is pushed, e.g. git tag v1.0.0 && git push --tags
on:
  push:
    tags:
      - 'v*.*.*'

# Required secrets (set in GitHub → Settings → Secrets → Actions):
#   DOCKERHUB_USERNAME  →  dumanoj
#   DOCKERHUB_TOKEN     →  Docker Hub access token (Account Settings → Security)

jobs:

  # ── Quality gates (mirrors CI — must pass before publishing) ─────────────────

  hadolint:
    name: Dockerfile Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Hadolint on Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

  backend:
    name: Java Backend Build & Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Build, test & quality gates
        run: |
          cd backend
          mvn clean verify
      - name: Upload static analysis reports
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-reports
          path: |
            backend/chatapp/target/checkstyle-result.xml
            backend/chatapp/target/pmd.xml
            backend/chatapp/target/spotbugsXml.xml
            backend/chatapp/target/jacoco.xml

  frontend:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: Run tests
        run: cd frontend && npm test -- --watchAll=false --passWithNoTests

  # ── Publish to Docker Hub & create GitHub Release ────────────────────────────

  publish:
    name: Publish Docker Image & Create Release
    needs: [hadolint, backend, frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create GitHub Releases

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Enables multi-platform builds and layer caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Produces tags:  dumanoj/boox:1.2.3  dumanoj/boox:1.2  dumanoj/boox:latest
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: dumanoj/boox
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=Boox
            org.opencontainers.image.description=AI chat application powered by Ollama

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Re-use cached layers from previous releases to speed up builds
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Attach docker-compose.release.yml as a downloadable asset on the release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: docker-compose.release.yml
          generate_release_notes: true
          body: |
            ## 🚀 Quick Start — No clone required

            Copy-paste these two commands and Boox will be running at **http://localhost:8080**:

            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/docker-compose.release.yml \
              -o docker-compose.boox.yml

            docker compose -f docker-compose.boox.yml up
            ```

            - The default AI model (`llama3.2:1b`, ~1.3 GB) downloads automatically on first run.
            - The model is cached in a Docker volume — subsequent starts are instant.
            - To use a different model, set `OLLAMA_MODEL` in a `.env` file next to the compose file.

            ## Docker image

            ```bash
            docker pull dumanoj/boox:${{ github.ref_name }}
            ```

            Or pull `dumanoj/boox:latest` for the most recent release.
